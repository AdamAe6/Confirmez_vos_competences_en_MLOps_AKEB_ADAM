name: CI/CD - API Scoring

on:
    push:
        branches: [ main, feature/* ]
    pull_request:
        branches: [ main ]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            - name: Set up Python 3.11
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"

            - name: Cache pip dependencies
              uses: actions/cache@v3
              with:
                  path: ~/.cache/pip
                  key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
                  restore-keys: |
                      ${{ runner.os }}-pip-

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Run tests
              run: |
                  pytest tests/ -v --tb=short

            - name: Test API can start
              run: |
                  timeout 10 python app.py > /dev/null 2>&1 || true
              continue-on-error: true

    build:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Build Docker image
              uses: docker/build-push-action@v4
              with:
                  context: .
                  push: false
                  tags: api-scoring:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Test Docker build
              run: |
                  docker build -t api-scoring:test .
                  echo "✅ Docker image built successfully"

    deploy:
        needs: build
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

        steps:
            - uses: actions/checkout@v3

            - name: Deploy notification
              run: |
                  echo "🚀 Pipeline CI/CD exécuté avec succès"
                  echo "✅ Tests passés"
                  echo "✅ Image Docker créée"
                  echo "📝 Note: Déploiement réel à configurer selon votre infrastructure"
